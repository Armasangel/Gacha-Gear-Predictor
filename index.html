<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Gear Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Gacha Gear Predictor</h1>
        <p>¿Vale la pena invertir en este artefacto?</p>
    </header>

    <main>
        <!-- FORM: Input del artefacto -->
        <section id="form-section">

            <div class="form-row">
                <label for="pieceType">Pieza</label>
                <select id="pieceType">
                    <option value="FLOWER">Flor</option>
                    <option value="PLUME">Pluma</option>
                    <option value="SANDS">Reloj</option>
                    <option value="GOBLET">Copa</option>
                    <option value="CIRCLET">Corona</option>
                </select>
            </div>

            <div class="form-row">
                <label for="mainStat">Main Stat</label>
                <select id="mainStat">
                    <!-- Se llena dinámicamente según la pieza -->
                </select>
            </div>

            <div class="form-row">
                <label for="level">Nivel</label>
                <select id="level">
                    <option value="0">+0</option>
                    <option value="4">+4</option>
                    <option value="8">+8</option>
                    <option value="12">+12</option>
                    <option value="16">+16</option>
                    <option value="20">+20</option>
                </select>
            </div>

            <div id="substats-section">
                <label>Substats</label>

                <div class="substat-row">
                    <select class="substat-type">
                        <option value="">-- Selecciona --</option>
                    </select>
                    <input class="substat-value" type="number" step="0.1" placeholder="Valor" />
                </div>

                <div class="substat-row">
                    <select class="substat-type">
                        <option value="">-- Selecciona --</option>
                    </select>
                    <input class="substat-value" type="number" step="0.1" placeholder="Valor" />
                </div>

                <div class="substat-row">
                    <select class="substat-type">
                        <option value="">-- Selecciona --</option>
                    </select>
                    <input class="substat-value" type="number" step="0.1" placeholder="Valor" />
                </div>

                <div class="substat-row" id="substat-4">
                    <select class="substat-type">
                        <option value="">-- Selecciona --</option>
                    </select>
                    <input class="substat-value" type="number" step="0.1" placeholder="Valor" />
                </div>
            </div>

            <div id="goal-section">
                <label>¿Qué substats te importan? (BuildGoal)</label>
                <div id="goal-checkboxes">
                    <!-- Se llena dinámicamente -->
                </div>
            </div>

            <button id="analyze-btn">Analizar</button>

        </section>

        <!-- RESULTS -->
        <section id="results-section" style="display:none;">

            <div id="fourth-substat-block" style="display:none;">
                <h2>4to Substat (no revelado aún)</h2>
                <div id="fourth-substat-content"></div>
            </div>

            <h2>Proyección al +20</h2>
            <table id="results-table">
                <thead>
                    <tr>
                        <th>Stat</th>
                        <th>Mejor</th>
                        <th>Promedio</th>
                        <th>Peor</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                </tbody>
                <tfoot id="results-foot">
                </tfoot>
            </table>

            <div id="verdict-block">
                <span id="verdict-label"></span>
                <p id="verdict-reason"></p>
            </div>

        </section>
    </main>

    <script type="module" src="js/ui/main.js"></script>

</body>
</html>
